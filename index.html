<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>

        body {
            background-color: #0b1a2a; 
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: white;
            margin: 0;
        }

       
        .header-static {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 10px 5%;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none; 
            pointer-events: none; 
        }

        .nav-links span { margin-right: 15px; color: #ccc; }

        .registration-card {
            background-color: rgba(255, 255, 255, 0.15);
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .profile-circle {
            width: 100px; height: 100px;
            background-color: #555;
            border-radius: 50%;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00d2ff;
        }

        .form-control { margin-bottom: 12px; }

        .btn-create {
            background-color: #00d2ff;
            border: none;
            width: 100%;
            font-weight: bold;
            color: white;
            padding: 10px;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.8rem;
            background-color: rgba(0,0,0,0.6);
            width: 100%;
            position: fixed;
            bottom: 0;
        }
    </style>
</head>
<body>

    <div class="header-static">
        <div class="nav-links">
            <span>Home</span>
            <span>Fare Matrix</span>
            <span>Schedule</span>
            <span>Help</span>
        </div>
        <div class="nav-auth">
            <span>Book Now</span>
        </div>
    </div>

    <div class="container">
        <div class="registration-card">
            <h2>REGISTRATION</h2> <p>Please fill out all required fields below.</p> <div class="profile-circle"><span>Photo</span></div>

            <input type="file" id="fileInput" class="form-control form-control-sm">
            <button onclick="uploadPic()" class="btn btn-info btn-sm mb-3 text-white">Upload Photo</button>

            <input type="text" id="fName" class="form-control" placeholder="First Name">
            <input type="text" id="lName" class="form-control" placeholder="Last Name">
            <input type="email" class="form-control" placeholder="Email">
            <input type="password" class="form-control" placeholder="Password">

            <button type="button" onclick="createAccount()" class="btn btn-create mb-2">Create my account</button>
            <button type="button" onclick="resetPage()" class="btn btn-light w-100 btn-sm">Cancel</button>
            
            <div class="mt-3">

    </div>

    <footer>
        Madeline Narciso | Grade 9 - Emerald &copy; 2026 </footer>

    <script>
      

        function uploadPic() {
            alert("Your profile pic has been uploaded!"); 
        }

        function createAccount() {
            let name = document.getElementById("fName").value; 
            
            if (name !== "") { 
                alert("Account successfully created!");
                location.reload(); \
            } else {
                alert("Please enter your First Name.");
            }
        }

        function resetPage() {
            location.reload();
        }
    </script>
</body>
</html>
